name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate tag matches Cargo.toml version
        run: |
          CARGO_VERSION="v$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].version')"
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: wasm32-wasip1
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2

      - name: Check format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --target wasm32-wasip1 -- -D warnings

      - name: Test
        run: cargo test --lib

      - name: Security audit
        run: |
          cargo install cargo-audit --locked --quiet
          cargo audit

      - name: Build WASM
        run: cargo build --target wasm32-wasip1 --release

      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: target/wasm32-wasip1/release/zellij-send-keys.wasm
          generate_release_notes: true
