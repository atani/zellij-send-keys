name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: wasm32-wasip1
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      - name: Check format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --target wasm32-wasip1 -- -D warnings

      - name: Test
        run: cargo test --lib

      - name: Build
        run: cargo build --target wasm32-wasip1 --release

      - name: Security audit
        run: |
          cargo install cargo-audit --locked --quiet
          cargo audit --ignore RUSTSEC-2025-0052 --ignore RUSTSEC-2024-0375 --ignore RUSTSEC-2024-0384 --ignore RUSTSEC-2024-0370 --ignore RUSTSEC-2021-0145
